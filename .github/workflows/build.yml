name: Build

on:
  workflow_call:
    inputs:
      is-nightly:
        required: true
        type: boolean
      archive-suffix:
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        target:
        - os: ubuntu-latest
          wheel-build-id: cp311-manylinux_x86_64
          blender-manifest-blender_min_version: 4.2.0
          blender-manifest-blender_max_version: 5.1.0
          blender-manifest-platform: linux-x64
        - os: ubuntu-latest
          wheel-build-id: cp313-manylinux_x86_64
          blender-manifest-blender_min_version: 5.1.0
          blender-manifest-blender_max_version: None
          blender-manifest-platform: linux-x64
        - os: windows-latest
          wheel-build-id: cp311-win_amd64
          blender-manifest-blender_min_version: 4.2.0
          blender-manifest-blender_max_version: 5.1.0
          blender-manifest-platform: windows-x64
        - os: windows-latest
          wheel-build-id: cp313-win_amd64
          blender-manifest-blender_min_version: 5.1.0
          blender-manifest-blender_max_version: None
          blender-manifest-platform: windows-x64
    runs-on: ${{ matrix.target.os }}
    name: build
    env:
      archive_name: dragex-${{ matrix.target.wheel-build-id }}-${{ inputs.archive-suffix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Generate build_id
        run: python3 .github/scripts/gen_build_id.py

      - name: Generate version info
        id: version_info
        run: |
          if [ ${{ inputs.is-nightly }} = true ]; then
            echo "version=$(cat version.txt)-nightly.$(cat dragex_backend/build_id.txt)" >> $GITHUB_OUTPUT
          else
            echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==3.4.0

      - name: Build dragex_backend wheel
        run: cibuildwheel --only ${{ matrix.target.wheel-build-id }} --output-dir wheelhouse dragex_backend

      - name: Copy wheel to addon
        run: |
          mkdir dragex_addon/wheels
          cp wheelhouse/*.whl dragex_addon/wheels/

      - name: Configure blender_manifest.toml
        run: |
          cd dragex_addon
          python3 ../.github/scripts/configure_blender_manifest.py blender_manifest.in.toml blender_manifest.toml ${{ steps.version_info.outputs.version }} ${{ matrix.target.blender-manifest-blender_min_version }} ${{ matrix.target.blender-manifest-blender_max_version }} ${{ matrix.target.blender-manifest-platform }} 'wheels/*.whl'
          rm blender_manifest.in.toml

      - name: Download Blender (Linux)
        if: runner.os == 'Linux'
        run: curl -o blender-4.2.11-linux-x64.tar.xz https://download.blender.org/release/Blender4.2/blender-4.2.11-linux-x64.tar.xz

      - name: Decompress Blender (Linux)
        if: runner.os == 'Linux'
        run: tar -xJvf blender-4.2.11-linux-x64.tar.xz

      - name: Build extension (Linux)
        if: runner.os == 'Linux'
        run: ./blender-4.2.11-linux-x64/blender --command extension build --source-dir dragex_addon --output-filepath ${{ env.archive_name }}.zip

      - name: Download Blender (Windows)
        if: runner.os == 'Windows'
        run: curl -o blender-4.2.11-windows-x64.zip https://download.blender.org/release/Blender4.2/blender-4.2.11-windows-x64.zip

      - name: Decompress Blender (Windows)
        if: runner.os == 'Windows'
        run: unzip blender-4.2.11-windows-x64.zip

      - name: Build extension (Windows)
        if: runner.os == 'Windows'
        run: ./blender-4.2.11-windows-x64/blender.exe --command extension build --source-dir dragex_addon --output-filepath ${{ env.archive_name }}.zip

      - name: Upload archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.archive_name }}
          path: |
            ${{ env.archive_name }}.zip
